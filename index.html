<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Configurações básicas do documento -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- 
      SEO - Título e Descrição 
      O Título aparece como o link azul no Google.
      A Description aparece como o texto explicativo abaixo do link.
    -->
    <title>Gerianderson Dsgn — Design de Alto Impacto em Salinas da Margarida</title>
    <meta name="description" content="Gerianderson Dsgn: Especialista em Social Media, Cardápios Digitais e Materiais Impressos em Salinas da Margarida. Transforme sua marca com design estratégico e profissional.">
    
    <!-- Canonical: informa ao Google qual é o endereço oficial para evitar duplicidade -->
    <link rel="canonical" href="https://geriandersondsgn.vercel.app/" />

    <!-- 
      Open Graph (Facebook / WhatsApp / LinkedIn)
      Define como seu site aparece quando você envia o link em redes sociais.
    -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://geriandersondsgn.vercel.app/">
    <meta property="og:title" content="Gerianderson Dsgn — Design de Alto Impacto">
    <meta property="og:description" content="Design estratégico para negócios: Social Media, Cardápios e Impressos em Salinas da Margarida.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&q=80&w=1200">

    <!-- 
      Twitter Card
      Configuração específica para exibição no X/Twitter.
    -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://geriandersondsgn.vercel.app/">
    <meta property="twitter:title" content="Gerianderson Dsgn — Design de Alto Impacto">
    <meta property="twitter:description" content="Design estratégico para negócios: Social Media, Cardápios e Impressos em Salinas da Margarida.">
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&q=80&w=1200">

    <!-- Preload de fontes ou scripts pode vir aqui futuramente para acelerar o carregamento -->
  </head>
  <body>
    <!-- 
      Root: onde o React injeta o conteúdo do site.
      Dica: Como o seu site é uma SPA (React), o Google lê o que você injeta 
      através dos seus componentes, por isso o conteúdo do PortfolioPage 
      é tão importante quanto este HTML.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
